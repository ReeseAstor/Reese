<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter Admin - Reese Astor</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css">
    <style>
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        .admin-header {
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--color-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .login-container {
            max-width: 400px;
            margin: 4rem auto;
            padding: 2rem;
            background: var(--color-panel);
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border);
        }
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .admin-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .admin-tab {
            padding: 0.75rem 1.5rem;
            background: var(--color-panel);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.3s;
        }
        .admin-tab.active {
            background: var(--color-primary);
            color: var(--color-bg);
        }
        .admin-panel {
            display: none;
        }
        .admin-panel.active {
            display: block;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--color-panel);
            padding: 1.5rem;
            border-radius: var(--radius-sm);
            border: 1px solid var(--color-border);
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--color-primary);
            margin: 0.5rem 0;
        }
        .stat-label {
            color: var(--color-text-muted);
            font-size: 0.9rem;
        }
        .subscribers-list {
            background: var(--color-panel);
            border-radius: var(--radius-sm);
            border: 1px solid var(--color-border);
            overflow: hidden;
        }
        .subscriber-item {
            padding: 1rem;
            border-bottom: 1px solid var(--color-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .subscriber-item:last-child {
            border-bottom: none;
        }
        .subscriber-email {
            font-weight: 500;
        }
        .subscriber-meta {
            font-size: 0.85rem;
            color: var(--color-text-muted);
            margin-top: 0.25rem;
        }
        .subscriber-status {
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .status-active {
            background: rgba(125, 231, 213, 0.2);
            color: var(--color-tertiary);
        }
        .status-inactive {
            background: rgba(255, 255, 255, 0.1);
            color: var(--color-text-muted);
        }
        .status-unverified {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
        }
        .newsletter-form {
            background: var(--color-panel);
            padding: 2rem;
            border-radius: var(--radius-sm);
            border: 1px solid var(--color-border);
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        .form-input {
            width: 100%;
            padding: 0.75rem;
            background: var(--color-bg-soft);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            color: var(--color-text);
            font-family: var(--font-sans);
        }
        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .editor-container {
            background: #fff;
            border-radius: var(--radius-sm);
            min-height: 300px;
        }
        .editor-container .ql-editor {
            min-height: 300px;
            color: #333;
        }
        .newsletter-list {
            background: var(--color-panel);
            border-radius: var(--radius-sm);
            border: 1px solid var(--color-border);
            overflow: hidden;
        }
        .newsletter-item {
            padding: 1.5rem;
            border-bottom: 1px solid var(--color-border);
        }
        .newsletter-item:last-child {
            border-bottom: none;
        }
        .newsletter-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1rem;
        }
        .newsletter-subject {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .newsletter-meta {
            font-size: 0.85rem;
            color: var(--color-text-muted);
        }
        .newsletter-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .analytics-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: rgba(125, 231, 213, 0.2);
            color: var(--color-tertiary);
            border-radius: 12px;
            font-size: 0.85rem;
            margin-right: 0.5rem;
        }
        .btn-danger {
            background: rgba(192, 57, 43, 0.2);
            color: #e74c3c;
            border: 1px solid rgba(192, 57, 43, 0.3);
        }
        .btn-danger:hover {
            background: rgba(192, 57, 43, 0.3);
        }
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 1rem 1.5rem;
            border-radius: var(--radius-sm);
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 1rem;
            max-width: 400px;
        }
        .notification-success {
            background: rgba(125, 231, 213, 0.2);
            border: 1px solid var(--color-tertiary);
            color: var(--color-tertiary);
        }
        .notification-error {
            background: rgba(192, 57, 43, 0.2);
            border: 1px solid #e74c3c;
            color: #e74c3c;
        }
        .preview-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 10000;
            overflow-y: auto;
            padding: 2rem;
        }
        .preview-modal.active {
            display: block;
        }
        .preview-content {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            border-radius: var(--radius-lg);
            padding: 2rem;
            color: #333;
        }
        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .scheduled-input {
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="login-screen" class="login-container" style="display: none;">
        <h2 style="margin-bottom: 1.5rem; text-align: center;">Admin Login</h2>
        <form id="login-form" class="login-form">
            <div class="form-group">
                <label class="form-label" for="login-username">Username</label>
                <input type="text" id="login-username" class="form-input" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="login-password">Password</label>
                <input type="password" id="login-password" class="form-input" required>
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
        </form>
    </div>

    <!-- Admin Panel -->
    <div id="admin-panel" style="display: none;">
        <div class="admin-container">
            <div class="admin-header">
                <div>
                    <h1>Newsletter Administration</h1>
                    <p>Manage subscribers and send newsletters</p>
                </div>
                <div>
                    <span id="admin-username" style="margin-right: 1rem; color: var(--color-text-muted);"></span>
                    <button class="btn btn-ghost" onclick="logout()">Logout</button>
                </div>
            </div>

            <div class="admin-tabs">
                <button class="admin-tab active" data-tab="dashboard">Dashboard</button>
                <button class="admin-tab" data-tab="subscribers">Subscribers</button>
                <button class="admin-tab" data-tab="newsletters">Newsletters</button>
            </div>

            <!-- Dashboard Panel -->
            <div id="dashboard" class="admin-panel active">
                <div class="stats-grid" id="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">Total Subscribers</div>
                        <div class="stat-value" id="stat-total">-</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Active Subscribers</div>
                        <div class="stat-value" id="stat-active">-</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Recent (30 days)</div>
                        <div class="stat-value" id="stat-recent">-</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Total Newsletters</div>
                        <div class="stat-value" id="stat-newsletters">-</div>
                    </div>
                </div>
            </div>

            <!-- Subscribers Panel -->
            <div id="subscribers" class="admin-panel">
                <div class="subscribers-list" id="subscribers-list">
                    <div style="padding: 2rem; text-align: center; color: var(--color-text-muted);">
                        Loading subscribers...
                    </div>
                </div>
            </div>

            <!-- Newsletters Panel -->
            <div id="newsletters" class="admin-panel">
                <div class="newsletter-form">
                    <h2 style="margin-bottom: 1.5rem;">Create New Newsletter</h2>
                    <form id="newsletter-form">
                        <div class="form-group">
                            <label class="form-label" for="newsletter-subject">Subject</label>
                            <input type="text" id="newsletter-subject" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="newsletter-content">Content</label>
                            <div id="editor" class="editor-container"></div>
                            <input type="hidden" id="newsletter-html-content">
                        </div>
                        <div class="form-group scheduled-input">
                            <label class="form-label" for="newsletter-scheduled">
                                <input type="checkbox" id="newsletter-scheduled" onchange="toggleScheduled()">
                                Schedule for later
                            </label>
                            <input type="datetime-local" id="newsletter-scheduled-time" class="form-input" style="display: none; margin-top: 0.5rem;">
                        </div>
                        <div class="form-actions">
                            <button type="button" class="btn btn-ghost" onclick="previewNewsletter()">Preview</button>
                            <button type="submit" class="btn btn-primary">Create Newsletter</button>
                        </div>
                    </form>
                </div>

                <h2 style="margin-bottom: 1rem;">Newsletters</h2>
                <div class="newsletter-list" id="newsletter-list">
                    <div style="padding: 2rem; text-align: center; color: var(--color-text-muted);">
                        Loading newsletters...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Preview Modal -->
    <div id="preview-modal" class="preview-modal">
        <div class="preview-content">
            <div class="preview-header">
                <h2>Email Preview</h2>
                <button class="btn btn-ghost" onclick="closePreview()">Close</button>
            </div>
            <div id="preview-body"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.min.js"></script>
    <script>
        const API_BASE = window.location.origin;
        let quill = null;

        // Initialize Quill editor
        function initEditor() {
            quill = new Quill('#editor', {
                theme: 'snow',
                modules: {
                    toolbar: [
                        [{ 'header': [1, 2, 3, false] }],
                        ['bold', 'italic', 'underline', 'strike'],
                        [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                        [{ 'color': [] }, { 'background': [] }],
                        ['link', 'image'],
                        ['clean']
                    ]
                }
            });
        }

        // Check authentication
        async function checkAuth() {
            try {
                const response = await fetch(`${API_BASE}/api/admin/auth`);
                const data = await response.json();
                
                if (data.authenticated) {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('admin-panel').style.display = 'block';
                    document.getElementById('admin-username').textContent = data.username;
                    initEditor();
                    loadStats();
                } else {
                    document.getElementById('login-screen').style.display = 'block';
                    document.getElementById('admin-panel').style.display = 'none';
                }
            } catch (error) {
                console.error('Auth check error:', error);
            }
        }

        // Login
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            
            try {
                const response = await fetch(`${API_BASE}/api/admin/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    checkAuth();
                } else {
                    showNotification(data.error || 'Login failed', 'error');
                }
            } catch (error) {
                console.error('Login error:', error);
                showNotification('Login error', 'error');
            }
        });

        // Logout
        async function logout() {
            try {
                await fetch(`${API_BASE}/api/admin/logout`, {
                    method: 'POST',
                    credentials: 'include'
                });
                checkAuth();
            } catch (error) {
                console.error('Logout error:', error);
            }
        }

        // Tab switching
        document.querySelectorAll('.admin-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                const tabName = tab.dataset.tab;
                
                document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                document.querySelectorAll('.admin-panel').forEach(p => p.classList.remove('active'));
                document.getElementById(tabName).classList.add('active');
                
                if (tabName === 'subscribers') {
                    loadSubscribers();
                } else if (tabName === 'newsletters') {
                    loadNewsletters();
                } else if (tabName === 'dashboard') {
                    loadStats();
                }
            });
        });

        // Load dashboard stats
        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE}/api/admin/stats`, {
                    credentials: 'include'
                });
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('stat-total').textContent = data.stats.totalSubscribers;
                    document.getElementById('stat-active').textContent = data.stats.activeSubscribers;
                    document.getElementById('stat-recent').textContent = data.stats.recentSubscriptions;
                    document.getElementById('stat-newsletters').textContent = data.stats.totalNewsletters;
                }
            } catch (error) {
                console.error('Error loading stats:', error);
                showNotification('Error loading statistics', 'error');
            }
        }

        // Load subscribers
        async function loadSubscribers() {
            try {
                const response = await fetch(`${API_BASE}/api/admin/subscribers`, {
                    credentials: 'include'
                });
                const data = await response.json();
                
                if (data.success) {
                    const list = document.getElementById('subscribers-list');
                    
                    if (data.subscribers.length === 0) {
                        list.innerHTML = '<div style="padding: 2rem; text-align: center; color: var(--color-text-muted);">No subscribers yet</div>';
                        return;
                    }
                    
                    list.innerHTML = data.subscribers.map(sub => {
                        let statusClass = 'status-inactive';
                        let statusText = 'Inactive';
                        if (sub.active && sub.verified) {
                            statusClass = 'status-active';
                            statusText = 'Active';
                        } else if (!sub.verified) {
                            statusClass = 'status-unverified';
                            statusText = 'Unverified';
                        }
                        
                        return `
                            <div class="subscriber-item">
                                <div>
                                    <div class="subscriber-email">${sub.email}</div>
                                    <div class="subscriber-meta">
                                        Subscribed: ${new Date(sub.subscribed_at).toLocaleDateString()}
                                        ${sub.verified_at ? ` • Verified: ${new Date(sub.verified_at).toLocaleDateString()}` : ''}
                                        ${sub.unsubscribed_at ? ` • Unsubscribed: ${new Date(sub.unsubscribed_at).toLocaleDateString()}` : ''}
                                    </div>
                                </div>
                                <span class="subscriber-status ${statusClass}">
                                    ${statusText}
                                </span>
                            </div>
                        `;
                    }).join('');
                }
            } catch (error) {
                console.error('Error loading subscribers:', error);
                showNotification('Error loading subscribers', 'error');
            }
        }

        // Load newsletters
        async function loadNewsletters() {
            try {
                const response = await fetch(`${API_BASE}/api/admin/newsletters`, {
                    credentials: 'include'
                });
                const data = await response.json();
                
                if (data.success) {
                    const list = document.getElementById('newsletter-list');
                    
                    if (data.newsletters.length === 0) {
                        list.innerHTML = '<div style="padding: 2rem; text-align: center; color: var(--color-text-muted);">No newsletters yet. Create one above!</div>';
                        return;
                    }
                    
                    list.innerHTML = await Promise.all(data.newsletters.map(async newsletter => {
                        let analyticsHtml = '';
                        if (newsletter.sent_at) {
                            try {
                                const analyticsRes = await fetch(`${API_BASE}/api/admin/newsletters/${newsletter.id}/analytics`, {
                                    credentials: 'include'
                                });
                                const analytics = await analyticsRes.json();
                                if (analytics.success) {
                                    analyticsHtml = `
                                        <div style="margin-top: 0.5rem;">
                                            <span class="analytics-badge">Sent: ${analytics.analytics.sent}</span>
                                            <span class="analytics-badge">Opens: ${analytics.analytics.uniqueOpens} (${analytics.analytics.openRate})</span>
                                            <span class="analytics-badge">Clicks: ${analytics.analytics.uniqueClicks} (${analytics.analytics.clickRate})</span>
                                        </div>
                                    `;
                                }
                            } catch (e) {}
                        }
                        
                        return `
                            <div class="newsletter-item">
                                <div class="newsletter-header">
                                    <div>
                                        <div class="newsletter-subject">${newsletter.subject}</div>
                                        <div class="newsletter-meta">
                                            Created: ${new Date(newsletter.created_at).toLocaleString()}
                                            ${newsletter.sent_at ? ` • Sent: ${new Date(newsletter.sent_at).toLocaleString()}` : ''}
                                            ${newsletter.scheduled_at ? ` • Scheduled: ${new Date(newsletter.scheduled_at).toLocaleString()}` : ''}
                                            ${newsletter.status === 'draft' ? ' • Draft' : newsletter.status === 'scheduled' ? ' • Scheduled' : ' • Sent'}
                                        </div>
                                        ${analyticsHtml}
                                    </div>
                                    <div class="newsletter-actions">
                                        ${!newsletter.sent_at ? `<button class="btn btn-primary" onclick="sendNewsletter('${newsletter.id}')">Send</button>` : ''}
                                        <button class="btn btn-ghost" onclick="previewNewsletterById('${newsletter.id}')">Preview</button>
                                        ${newsletter.sent_at ? `<button class="btn btn-ghost" onclick="viewAnalytics('${newsletter.id}')">Analytics</button>` : ''}
                                        <button class="btn btn-danger" onclick="deleteNewsletter('${newsletter.id}')">Delete</button>
                                    </div>
                                </div>
                            </div>
                        `;
                    }));
                }
            } catch (error) {
                console.error('Error loading newsletters:', error);
                showNotification('Error loading newsletters', 'error');
            }
        }

        // Toggle scheduled input
        function toggleScheduled() {
            const checkbox = document.getElementById('newsletter-scheduled');
            const input = document.getElementById('newsletter-scheduled-time');
            input.style.display = checkbox.checked ? 'block' : 'none';
        }

        // Create newsletter
        document.getElementById('newsletter-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const subject = document.getElementById('newsletter-subject').value;
            const content = quill.getText();
            const htmlContent = quill.root.innerHTML;
            const scheduled = document.getElementById('newsletter-scheduled').checked;
            const scheduledTime = scheduled ? document.getElementById('newsletter-scheduled-time').value : null;
            
            try {
                const response = await fetch(`${API_BASE}/api/admin/newsletters`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({ 
                        subject, 
                        content,
                        html_content: htmlContent,
                        scheduled_at: scheduledTime ? new Date(scheduledTime).toISOString() : null
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showNotification(scheduled ? 'Newsletter scheduled successfully!' : 'Newsletter created successfully!', 'success');
                    document.getElementById('newsletter-form').reset();
                    quill.setContents([]);
                    loadNewsletters();
                } else {
                    showNotification(data.error || 'Error creating newsletter', 'error');
                }
            } catch (error) {
                console.error('Error creating newsletter:', error);
                showNotification('Error creating newsletter', 'error');
            }
        });

        // Preview newsletter
        function previewNewsletter() {
            const subject = document.getElementById('newsletter-subject').value;
            const htmlContent = quill.root.innerHTML;
            
            if (!subject || !htmlContent) {
                showNotification('Please add subject and content first', 'error');
                return;
            }
            
            document.getElementById('preview-body').innerHTML = `
                <h2>${subject}</h2>
                <div style="margin-top: 1rem;">${htmlContent}</div>
            `;
            document.getElementById('preview-modal').classList.add('active');
        }

        async function previewNewsletterById(id) {
            try {
                const response = await fetch(`${API_BASE}/api/admin/newsletters`, {
                    credentials: 'include'
                });
                const data = await response.json();
                const newsletter = data.newsletters.find(n => n.id === id);
                
                if (newsletter) {
                    document.getElementById('preview-body').innerHTML = `
                        <h2>${newsletter.subject}</h2>
                        <div style="margin-top: 1rem;">${newsletter.html_content || newsletter.content.replace(/\n/g, '<br>')}</div>
                    `;
                    document.getElementById('preview-modal').classList.add('active');
                }
            } catch (error) {
                showNotification('Error loading preview', 'error');
            }
        }

        function closePreview() {
            document.getElementById('preview-modal').classList.remove('active');
        }

        // Send newsletter
        async function sendNewsletter(id) {
            if (!confirm('Are you sure you want to send this newsletter to all active subscribers?')) {
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/admin/newsletters/${id}/send`, {
                    method: 'POST',
                    credentials: 'include'
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showNotification(`Newsletter sent to ${data.sentCount} subscribers!`, 'success');
                    loadNewsletters();
                } else {
                    showNotification(data.error || 'Error sending newsletter', 'error');
                }
            } catch (error) {
                console.error('Error sending newsletter:', error);
                showNotification('Error sending newsletter', 'error');
            }
        }

        // View analytics
        async function viewAnalytics(id) {
            try {
                const response = await fetch(`${API_BASE}/api/admin/newsletters/${id}/analytics`, {
                    credentials: 'include'
                });
                const data = await response.json();
                
                if (data.success) {
                    const analytics = data.analytics;
                    alert(`Newsletter Analytics:\n\nSent: ${analytics.sent}\nOpens: ${analytics.uniqueOpens} (${analytics.openRate})\nClicks: ${analytics.uniqueClicks} (${analytics.clickRate})`);
                }
            } catch (error) {
                showNotification('Error loading analytics', 'error');
            }
        }

        // Delete newsletter
        async function deleteNewsletter(id) {
            if (!confirm('Are you sure you want to delete this newsletter?')) {
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/admin/newsletters/${id}`, {
                    method: 'DELETE',
                    credentials: 'include'
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showNotification('Newsletter deleted', 'success');
                    loadNewsletters();
                } else {
                    showNotification(data.error || 'Error deleting newsletter', 'error');
                }
            } catch (error) {
                console.error('Error deleting newsletter:', error);
                showNotification('Error deleting newsletter', 'error');
            }
        }

        // Show notification
        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.className = `notification notification-${type}`;
            notification.textContent = message;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 5000);
        }

        // Initialize
        checkAuth();
    </script>
</body>
</html>
